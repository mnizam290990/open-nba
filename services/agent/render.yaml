services:
  - type: web
    name: opennba-agent
    env: python
    buildCommand: pip install uv && uv sync
    startCommand: uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATA_MODE
        value: MOCK
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: opennba-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        value: opennba-prod
    healthCheckPath: /health
    autoDeploy: true
    rootDir: services/agent

databases:
  - name: opennba-db
    plan: free
    databaseName: opennba
    user: opennba
